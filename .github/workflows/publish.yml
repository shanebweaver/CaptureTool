name: Publish to Microsoft Store

on:
  workflow_run:
    workflows: ["Build"]
    types:
      - completed
    branches:
      - main

jobs:
  publish:
    runs-on: windows-2025-vs2026
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    concurrency:
      group: microsoft-store-draft-submission
      cancel-in-progress: false
    
    permissions:
      actions: read
      contents: read
    
    steps:
    - name: Download Store package artifact
      uses: actions/download-artifact@v8
      with:
        name: StorePackage
        path: packages
        run-id: ${{ github.event.workflow_run.id }}
        github-token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup Microsoft Store Developer CLI
      uses: microsoft/microsoft-store-apppublisher@v1.3
    
    - name: Configure Microsoft Store Developer CLI
      shell: pwsh
      env:
        PARTNER_CENTER_TENANT_ID: ${{ secrets.PARTNER_CENTER_TENANT_ID }}
        PARTNER_CENTER_SELLER_ID: ${{ secrets.PARTNER_CENTER_SELLER_ID }}
        PARTNER_CENTER_CLIENT_ID: ${{ secrets.PARTNER_CENTER_CLIENT_ID }}
        PARTNER_CENTER_CLIENT_SECRET: ${{ secrets.PARTNER_CENTER_CLIENT_SECRET }}
      run: |
        msstore reconfigure `
          --tenantId $env:PARTNER_CENTER_TENANT_ID `
          --sellerId $env:PARTNER_CENTER_SELLER_ID `
          --clientId $env:PARTNER_CENTER_CLIENT_ID `
          --clientSecret $env:PARTNER_CENTER_CLIENT_SECRET
    
    - name: Create draft Store submission
      shell: pwsh
      env:
        PARTNER_CENTER_STORE_PRODUCT_ID: ${{ secrets.PARTNER_CENTER_STORE_PRODUCT_ID }}
      run: |
        $packageFiles = Get-ChildItem -Path packages -Recurse -File -Include "*.msixupload", "*.msixbundle"
        $packageFile = $packageFiles |
          Where-Object { $_.Name -match "x64.*arm64|arm64.*x64" } |
          Sort-Object FullName |
          Select-Object -First 1

        if (-not $packageFile) {
          $availablePackages = ($packageFiles | ForEach-Object FullName) -join [Environment]::NewLine
          throw "No combined .msixupload or .msixbundle package found. Available packages:$([Environment]::NewLine)$availablePackages"
        }

        Write-Host "Creating draft Store submission from $($packageFile.FullName)"
        msstore publish "$($packageFile.FullName)" -id $env:PARTNER_CENTER_STORE_PRODUCT_ID --noCommit -v
