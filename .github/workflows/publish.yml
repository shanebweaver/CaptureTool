name: Publish to Microsoft Store

on:
  workflow_dispatch:
    inputs:
      build_run_id:
        description: GitHub Actions run ID from a successful Build workflow
        required: true
  workflow_run:
    workflows: ["Build"]
    types:
      - completed
    branches:
      - main

jobs:
  publish:
    runs-on: windows-2025-vs2026
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    concurrency:
      group: microsoft-store-publish
      cancel-in-progress: false
    
    strategy:
      matrix:
        platform: [x64, arm64]
    
    permissions:
      actions: read
      contents: read
    
    steps:
    - name: Download ${{ matrix.platform }} artifacts
      uses: actions/download-artifact@v8
      with:
        name: StorePackage-${{ matrix.platform }}
        path: packages
        run-id: ${{ github.event.workflow_run.id || inputs.build_run_id }}
        github-token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup Microsoft Store Developer CLI
      uses: microsoft/microsoft-store-apppublisher@v1.3
    
    - name: Configure Microsoft Store Developer CLI
      shell: pwsh
      env:
        PARTNER_CENTER_TENANT_ID: ${{ secrets.PARTNER_CENTER_TENANT_ID }}
        PARTNER_CENTER_SELLER_ID: ${{ secrets.PARTNER_CENTER_SELLER_ID }}
        PARTNER_CENTER_CLIENT_ID: ${{ secrets.PARTNER_CENTER_CLIENT_ID }}
        PARTNER_CENTER_CLIENT_SECRET: ${{ secrets.PARTNER_CENTER_CLIENT_SECRET }}
      run: |
        msstore reconfigure `
          --tenantId $env:PARTNER_CENTER_TENANT_ID `
          --sellerId $env:PARTNER_CENTER_SELLER_ID `
          --clientId $env:PARTNER_CENTER_CLIENT_ID `
          --clientSecret $env:PARTNER_CENTER_CLIENT_SECRET
    
    - name: Publish ${{ matrix.platform }} package
      shell: pwsh
      env:
        STORE_PRODUCT_ID: ${{ secrets.STORE_PRODUCT_ID }}
      run: |
        $packageFiles = Get-ChildItem -Path packages -Recurse -File -Include "*.msixupload", "*.msix"
        $packageFile = $packageFiles |
          Where-Object { $_.Extension -ieq ".msixupload" } |
          Sort-Object FullName |
          Select-Object -First 1

        if (-not $packageFile) {
          $packageFile = $packageFiles |
            Where-Object { $_.Name -match "_${{ matrix.platform }}\.msix$" -and $_.Name -notmatch "_scale-" } |
            Sort-Object FullName |
            Select-Object -First 1
        }

        if (-not $packageFile) {
          $availablePackages = ($packageFiles | ForEach-Object FullName) -join [Environment]::NewLine
          throw "No publishable package found for ${{ matrix.platform }}. Available packages:$([Environment]::NewLine)$availablePackages"
        }

        Write-Host "Publishing $($packageFile.FullName)"
        msstore publish "$($packageFile.FullName)" -id $env:STORE_PRODUCT_ID -v
