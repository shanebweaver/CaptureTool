name: Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-2025-vs2026

    steps:
    - name: Checkout code
      uses: actions/checkout@v7
      with:
        submodules: recursive
        
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v3

    - name: Setup vcpkg
      run: |
        cd vcpkg
        .\bootstrap-vcpkg.bat
        .\vcpkg.exe integrate install
      shell: pwsh

    - name: Set VCPKG_ROOT environment variable
      run: |
        echo "VCPKG_ROOT=${{ github.workspace }}\vcpkg" >> $env:GITHUB_ENV
      shell: pwsh

    - name: Install Store vcpkg dependencies
      run: |
        .\vcpkg\vcpkg.exe install `
          wil:x64-windows `
          wil:arm64-windows `
          --classic `
          --x-install-root="${{ github.workspace }}\vcpkg_installed"
      shell: pwsh

    - name: Build combined Store package
      run: |
        $project = "src\CaptureTool.Presentation.Windows.WinUI\CaptureTool.Presentation.Windows.WinUI.csproj"
        $solutionDir = "${{ github.workspace }}\"
        msbuild $project `
          /restore `
          /p:Configuration=Release `
          /p:Platform=x64 `
          /p:SolutionDir="$solutionDir" `
          /p:GenerateAppxPackageOnBuild=true `
          /p:UapAppxPackageBuildMode=StoreUpload `
          /p:AppxBundle=Always `
          /p:AppxBundlePlatforms="x64|arm64" `
          /p:AppxPackageDir="${solutionDir}output\" `
          /p:GenerateTemporaryStoreCertificate=false
      shell: pwsh

    - name: Install coverage tools
      run: |
        dotnet tool install --global dotnet-coverage
        dotnet tool install --global dotnet-reportgenerator-globaltool

    - name: Run .NET tests with coverage
      run: |
        dotnet-coverage collect "powershell -NoProfile -ExecutionPolicy Bypass -File .github\scripts\run-managed-tests.ps1" -s .github\coverage.runsettings -f cobertura -o coverage.cobertura.xml

    - name: Generate coverage report
      run: |
        reportgenerator -reports:coverage.cobertura.xml -targetdir:coverage-report -reporttypes:"HtmlInline_AzurePipelines;MarkdownSummaryGithub" -title:"CaptureTool Coverage"

    - name: Enforce coverage threshold
      run: |
        [xml]$coverage = Get-Content coverage.cobertura.xml
        $lineRate = [double]$coverage.coverage.'line-rate'
        $coveragePercent = [math]::Round($lineRate * 100, 2)
        $minimumCoveragePercent = 80
        "Line coverage: $coveragePercent%" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
        "Minimum line coverage: $minimumCoveragePercent%" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
        if ($coveragePercent -lt $minimumCoveragePercent) {
          throw "Line coverage $coveragePercent% is below the required $minimumCoveragePercent%."
        }

    - name: Publish coverage summary
      run: |
        Get-Content coverage-report\SummaryGithub.md | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append

    - name: Upload coverage report artifact
      uses: actions/upload-artifact@v7
      with:
        name: coverage-report
        path: |
          coverage.cobertura.xml
          coverage-report

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v7
      with:
        files: coverage.cobertura.xml
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: true

    - name: Verify combined Store package
      shell: pwsh
      run: |
        Add-Type -AssemblyName System.IO.Compression.FileSystem

        $packageFile = Get-ChildItem -Path output -Recurse -File -Filter "*_bundle.msixupload" -ErrorAction SilentlyContinue |
          Sort-Object Length -Descending |
          Select-Object -First 1

        if (-not $packageFile) {
          throw "No final .msixupload package was found under output."
        }

        $appPdbName = "CaptureTool.Presentation.Windows.WinUI.pdb"
        $nativePdbsByArchitecture = @{
          "arm64" = Get-ChildItem -Path src\CaptureTool.Presentation.Windows.WinUI\bin\ARM64\Release -Recurse -File -Filter $appPdbName |
            Where-Object { $_.FullName -like "*\native\$appPdbName" } |
            Sort-Object Length -Descending |
            Select-Object -First 1
          "x64" = Get-ChildItem -Path src\CaptureTool.Presentation.Windows.WinUI\bin\x64\Release -Recurse -File -Filter $appPdbName |
            Where-Object { $_.FullName -like "*\native\$appPdbName" } |
            Sort-Object Length -Descending |
            Select-Object -First 1
        }

        foreach ($architecture in $nativePdbsByArchitecture.Keys) {
          if (-not $nativePdbsByArchitecture[$architecture]) {
            throw "No Native AOT PDB was found for $architecture."
          }
        }

        $uploadRoot = Join-Path $env:RUNNER_TEMP "store-upload-inspect"
        $bundleRoot = Join-Path $env:RUNNER_TEMP "store-bundle-inspect"
        $symbolsRoot = Join-Path $env:RUNNER_TEMP "store-symbols-inspect"

        foreach ($path in @($uploadRoot, $bundleRoot, $symbolsRoot)) {
          Remove-Item -LiteralPath $path -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $path -Force | Out-Null
        }

        [System.IO.Compression.ZipFile]::ExtractToDirectory($packageFile.FullName, $uploadRoot)
        $bundleFile = Get-ChildItem -Path $uploadRoot -Recurse -File -Filter "*.msixbundle" |
          Select-Object -First 1

        if (-not $bundleFile) {
          throw "The upload package does not contain an .msixbundle."
        }

        [System.IO.Compression.ZipFile]::ExtractToDirectory($bundleFile.FullName, $bundleRoot)
        $bundleEntries = Get-ChildItem -Path $bundleRoot -Recurse -File |
          Select-Object -ExpandProperty Name

        $bundleEntries | ForEach-Object { Write-Host "Bundle entry: $_" }

        if (-not ($bundleEntries -match "_x64\.msix$")) {
          throw "The final Store bundle does not contain an x64 app package."
        }

        if (-not ($bundleEntries -match "_arm64\.msix$")) {
          throw "The final Store bundle does not contain an ARM64 app package."
        }

        $symbolPackages = Get-ChildItem -Path $uploadRoot -Recurse -File -Filter "*.appxsym"

        if (-not $symbolPackages) {
          throw "The upload package does not contain any .appxsym symbol packages."
        }

        foreach ($symbolPackage in $symbolPackages) {
          $symbolRoot = Join-Path $symbolsRoot $symbolPackage.BaseName
          New-Item -ItemType Directory -Path $symbolRoot -Force | Out-Null
          [System.IO.Compression.ZipFile]::ExtractToDirectory($symbolPackage.FullName, $symbolRoot)

          $packagedAppPdb = Get-ChildItem -Path $symbolRoot -Recurse -File -Filter $appPdbName |
            Select-Object -First 1

          if (-not $packagedAppPdb) {
            throw "The symbol package $($symbolPackage.Name) does not contain $appPdbName."
          }

          if ($symbolPackage.Name -match "_(?<arch>arm64|x64)\.appxsym$") {
            $architecture = $Matches.arch
          }
          else {
            throw "Could not infer architecture from symbol package $($symbolPackage.Name)."
          }

          $expectedHash = (Get-FileHash -Algorithm SHA256 -LiteralPath $nativePdbsByArchitecture[$architecture].FullName).Hash
          $actualHash = (Get-FileHash -Algorithm SHA256 -LiteralPath $packagedAppPdb.FullName).Hash

          if ($actualHash -ne $expectedHash) {
            throw "$($symbolPackage.Name) does not contain the Native AOT PDB for $architecture."
          }
        }

        Write-Host "Verified combined Store package: $($packageFile.FullName)"

    - name: Upload Package Artifacts
      uses: actions/upload-artifact@v7
      with:
        name: StorePackage
        if-no-files-found: error
        path: |
          output/*.msix
          output/*.msixbundle
          output/*.msixupload
          output/*.appxsym
