name: Test

on:
  pull_request:

jobs:
  test:
    runs-on: windows-2025-vs2026

    steps:
    - name: Checkout code
      uses: actions/checkout@v7
      with:
        submodules: recursive

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v3

    - name: Setup vcpkg
      run: |
        cd vcpkg
        .\bootstrap-vcpkg.bat
        .\vcpkg.exe integrate install

    - name: Set VCPKG_ROOT environment variable
      run: |
        echo "VCPKG_ROOT=${{ github.workspace }}\vcpkg" >> $env:GITHUB_ENV

    - name: Restore and build solution
      run: |
        msbuild CaptureTool.slnx /restore /p:Configuration=Release /p:Platform=x64

    - name: Install coverage tools
      run: |
        dotnet tool install --global dotnet-coverage

    - name: Run C++ native tests
      run: |
        $vsTestPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Workload.NativeDesktop -property installationPath
        $vsTestExe = Join-Path $vsTestPath "Common7\IDE\CommonExtensions\Microsoft\TestWindow\vstest.console.exe"
        & $vsTestExe "${{ github.workspace }}\x64\Release\CaptureInterop.Tests.dll" /Platform:x64

    - name: Run .NET tests with coverage
      run: |
        dotnet-coverage collect "powershell -NoProfile -ExecutionPolicy Bypass -File .github\scripts\run-managed-tests.ps1" -s .github\coverage.runsettings -f cobertura -o coverage.cobertura.xml

    - name: Enforce coverage threshold
      run: |
        [xml]$coverage = Get-Content coverage.cobertura.xml
        $lineRate = [double]$coverage.coverage.'line-rate'
        $coveragePercent = [math]::Round($lineRate * 100, 2)
        $minimumCoveragePercent = 80
        "Line coverage: $coveragePercent%" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
        "Minimum line coverage: $minimumCoveragePercent%" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
        if ($coveragePercent -lt $minimumCoveragePercent) {
          throw "Line coverage $coveragePercent% is below the required $minimumCoveragePercent%."
        }
